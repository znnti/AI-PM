<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="360" rx="24" fill="#F6F6F3"/>
  <text x="64" y="68" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Four operating modes</text>
  <text x="64" y="102" fill="#666666" font-family="Arial, Helvetica, sans-serif" font-size="18">The skill behaves differently for full delivery, scoped execution, local repair, and skill maintenance.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="64" y="148" width="272" height="150" rx="20" fill="#FFF8E7" stroke="#C89E2B" stroke-width="2"/>
    <text x="88" y="188" fill="#111111" font-size="24" font-weight="700">Full product delivery</text>
    <text x="88" y="222" fill="#5E584B" font-size="18">End-to-end flow from idea to</text>
    <text x="88" y="248" fill="#5E584B" font-size="18">PRD, prototype, contracts,</text>
    <text x="88" y="274" fill="#5E584B" font-size="18">and developer handoff.</text>

    <rect x="360" y="148" width="272" height="150" rx="20" fill="#FFFFFF" stroke="#D8D2C2" stroke-width="2"/>
    <text x="384" y="188" fill="#111111" font-size="24" font-weight="700">Stage-specific delivery</text>
    <text x="384" y="222" fill="#5E584B" font-size="18">Run one stage only such as</text>
    <text x="384" y="248" fill="#5E584B" font-size="18">PRD, HTML, Design.md, or</text>
    <text x="384" y="274" fill="#5E584B" font-size="18">Asset-Spec work.</text>

    <rect x="656" y="148" width="272" height="150" rx="20" fill="#EEF5FF" stroke="#5C94D6" stroke-width="2"/>
    <text x="680" y="188" fill="#111111" font-size="24" font-weight="700">Screen-local refinement</text>
    <text x="680" y="222" fill="#5E584B" font-size="18">Fix one route, page, button</text>
    <text x="680" y="248" fill="#5E584B" font-size="18">family, icon group, or asset</text>
    <text x="680" y="274" fill="#5E584B" font-size="18">batch without full reload.</text>

    <rect x="952" y="148" width="264" height="150" rx="20" fill="#EDF7EF" stroke="#4D9A66" stroke-width="2"/>
    <text x="976" y="188" fill="#111111" font-size="24" font-weight="700">Skill maintenance</text>
    <text x="976" y="222" fill="#5E584B" font-size="18">Edit rules, references, and</text>
    <text x="976" y="248" fill="#5E584B" font-size="18">routing logic without entering</text>
    <text x="976" y="274" fill="#5E584B" font-size="18">product stage gates.</text>
  </g>
</svg>
